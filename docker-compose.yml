services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist SQLite database - persistence.py expects vault.db at /app/vault.db
      - ./backend/vault.db:/app/vault.db
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./aether-frontend
      args:
        VITE_API_URL: https://api.aethercompass.com
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiMTNkNjZhZTMwOTU1Mzk5ZTU5M2RjZmQyYjExZTgwMWEiLCJ0IjoiN2Q5Njk5MmMtOWU5NS00ZjdlLThlZmYtM2QzOWUwOWMwZjE2IiwicyI6IllqRTVZemM0TWpjdFkyVmlNUzAwWmpFNUxUa3hOV1F0WkRRME1qTTRaR0V4T0RJeSJ9
    depends_on:
      - frontend
      - backend
    restart: always
